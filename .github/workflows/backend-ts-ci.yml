name: Backend TypeScript CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-ts-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Detect relevant changes
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const patterns = [
              /^backend\//,
              /^shared\//,
              /^configs\/oxfmt\/base\.json$/,
              /^configs\/oxlint\/base\.json$/,
              /^configs\/oxlint\/node\.json$/,
              /^package\.json$/,
              /^package-lock\.json$/,
              /^tsconfig\.base\.json$/,
              /^\.github\/workflows\/backend-ts-ci\.yml$/,
            ]

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const shouldRun = files.some(({ filename }) =>
              patterns.some((pattern) => pattern.test(filename)),
            )

            core.info(`backend relevant changes: ${shouldRun}`)
            core.setOutput('should_run', String(shouldRun))

      - name: Skip backend checks when changes are irrelevant
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No backend-relevant changes detected."

      - name: Checkout
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/checkout@v7.0.1

      - name: Setup Bun
        if: steps.changes.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: bun install

      - name: Generate Prisma client
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend prisma:generate

      - name: Format check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd shared format:check

      - name: Lint check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd shared lint:check

      - name: Type check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd shared typecheck

      - name: Shared tests
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd shared test

      - name: Backend format check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend format:check

      - name: Backend lint check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend lint:check

      - name: Backend type check
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend typecheck

      - name: Unit tests (Bun)
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend test

      - name: Coverage check (Vitest)
        if: steps.changes.outputs.should_run == 'true'
        run: bun run --cwd backend test:coverage
