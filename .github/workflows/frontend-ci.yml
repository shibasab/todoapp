name: Frontend CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Detect relevant changes
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const patterns = [
              /^frontend\//,
              /^shared\//,
              /^configs\/oxfmt\/base\.json$/,
              /^configs\/oxlint\/base\.json$/,
              /^configs\/oxlint\/browser-vue\.json$/,
              /^package\.json$/,
              /^package-lock\.json$/,
              /^tsconfig\.base\.json$/,
              /^\.github\/workflows\/frontend-ci\.yml$/,
            ]

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const shouldRun = files.some(({ filename }) =>
              patterns.some((pattern) => pattern.test(filename)),
            )

            core.info(`frontend relevant changes: ${shouldRun}`)
            core.setOutput('should_run', String(shouldRun))

      - name: Skip frontend checks when changes are irrelevant
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No frontend-relevant changes detected."

      - name: Checkout
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: npm ci --workspace frontend --workspace shared --include-workspace-root

      - name: Lint check
        if: steps.changes.outputs.should_run == 'true'
        run: npm run -w frontend lint:check

      - name: Format check
        if: steps.changes.outputs.should_run == 'true'
        run: npm run -w frontend format:check

      - name: Type check
        if: steps.changes.outputs.should_run == 'true'
        run: npm run -w frontend typecheck

      - name: Test coverage
        if: steps.changes.outputs.should_run == 'true'
        run: npm run -w frontend test:coverage
